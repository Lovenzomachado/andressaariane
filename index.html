<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Andressa Ariane - Portfolio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── FONTE MANGO GROTESQUE do GitHub ── */
        @font-face {
            font-family: 'Mango Grotesque';
            src: url('https://raw.githubusercontent.com/Lovenzomachado/andressaariane/main/Mango%20Grotesque.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        body {
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
        }

        #portfolio-root {
            width: 100%;
            height: 100vh;
            position: relative;
            background: #fff;
        }

        /* ── DESKTOP ── */
        .desktop-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .desktop-layout .col-left {
            width: 66.666%;
            position: relative;
            overflow: hidden;
            background: #fff;
        }

        .desktop-layout .col-right {
            width: 33.333%;
            position: relative;
            overflow: hidden;
            border-left: 0.5px solid #e8e8e8;
            background: #f8f8f8;
        }

        /* ── Track que se move verticalmente ── */
        .project-track {
            position: absolute;
            width: 100%;
            will-change: transform;
        }

        /* ── Item individual da lista ── */
        .project-item {
            padding: 8px 32px 8px 52px;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0.2;
            transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: -12px;
        }

        .project-item.active {
            opacity: 1;
        }

        /* Título com Mango Grotesque */
        .project-item .label {
            font-family: 'Mango Grotesque', Arial, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            line-height: 1;
            letter-spacing: -0.01em;
            color: #000;
            white-space: nowrap;
            font-size: clamp(80px, 10vw, 200px);
        }

        /* Tag à direita */
        .project-item .tag {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 9px;
            font-weight: 300;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #aaa;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.8s ease 0.15s;
            margin-left: 20px;
        }

        .project-item.active .tag {
            opacity: 1;
        }

        /* ── Imagens ── */
        .image-stage {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
        }

        .image-slot {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #f0f0f0;
        }

        .image-slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        .image-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .img-label {
            position: absolute;
            bottom: 14px;
            left: 16px;
            font-size: 8px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 300;
            z-index: 2;
            pointer-events: none;
        }

        /* ── Navegação ── */
        nav {
            position: absolute;
            top: 26px;
            left: 52px;
            right: 26px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .nav-logo {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #000;
        }

        .nav-links {
            display: flex;
            gap: 28px;
            pointer-events: auto;
        }

        .nav-links a {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 8.5px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #aaa;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #000;
        }

        .scroll-hint {
            position: absolute;
            bottom: 26px;
            left: 52px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 8.5px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .scroll-hint::before {
            content: '';
            display: block;
            width: 20px;
            height: 0.5px;
            background: #ccc;
        }

        .counter {
            position: absolute;
            bottom: 26px;
            right: 26px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 9px;
            font-weight: 300;
            letter-spacing: 0.14em;
            color: #ccc;
            z-index: 100;
        }

        .counter span {
            color: #000;
            font-size: 12px;
            font-weight: 700;
        }

        /* ────────────────────────────────────────── */
        /* MOBILE (até 768px) */
        /* ────────────────────────────────────────── */
        @media (max-width: 768px) {
            .desktop-layout {
                flex-direction: column;
            }

            .desktop-layout .col-left {
                width: 100%;
                order: 2;
                height: 40%;
            }

            .desktop-layout .col-right {
                width: 100%;
                order: 1;
                height: 60%;
                border-left: none;
                border-bottom: 0.5px solid #e8e8e8;
            }

            .project-item {
                padding: 4px 20px;
                margin-bottom: 0;
            }

            .project-item .label {
                font-size: clamp(36px, 8vw, 80px);
            }

            .project-item .tag {
                font-size: 7px;
                margin-left: 10px;
            }

            .image-slot:last-child {
                display: none;
            }

            nav {
                top: 16px;
                left: 20px;
                right: 16px;
            }

            .nav-logo {
                font-size: 9px;
            }

            .nav-links {
                gap: 16px;
            }

            .nav-links a {
                font-size: 7px;
            }

            .scroll-hint {
                bottom: 16px;
                left: 20px;
                font-size: 7px;
            }

            .counter {
                bottom: 16px;
                right: 16px;
                font-size: 7px;
            }

            .counter span {
                font-size: 10px;
            }
        }

        /* Ajuste para 1920px+ */
        @media (min-width: 1920px) {
            .project-item .label {
                font-size: 200px;
            }
        }

        /* Ajuste para 1280px */
        @media (width: 1280px) {
            .project-item .label {
                font-size: 126px;
            }
        }
    </style>
</head>
<body>
    <div id="portfolio-root">
        <nav>
            <div class="nav-logo">Andressa Ariane</div>
            <div class="nav-links">
                <a href="#">Sobre mim</a>
                <a href="#">Contato</a>
            </div>
        </nav>

        <div class="desktop-layout">
            <div class="col-left" id="left-col">
                <div class="project-track" id="project-track"></div>
            </div>
            <div class="col-right">
                <div class="image-stage" id="image-stage">
                    <div class="image-slot" id="slot-top"></div>
                    <div class="image-slot" id="slot-bot"></div>
                </div>
            </div>
        </div>

        <div class="scroll-hint">Scroll para navegar</div>
        <div class="counter"><span id="counter-num">01</span> / 07</div>
    </div>

    <script>
        // Projetos
        const projects = [
            { name: "Ipanema Pluma", tag: "Identidade Visual", images: [
                "https://images.unsplash.com/photo-1523381294911-8d3cead13475?w=800&h=1000&fit=crop",
                "https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=800&h=1000&fit=crop"
            ]},
            { name: "Quinto Andar", tag: "Branding Digital", images: [
                "https://images.unsplash.com/photo-1560185893-a55cbc8c57e8?w=800&h=1000&fit=crop",
                "https://images.unsplash.com/photo-1486325212027-8081e485255e?w=800&h=1000&fit=crop"
            ]},
            { name: "Élev Experience", tag: "Skincare Print", images: [
                "https://images.unsplash.com/photo-1556228578-8c89e6adf883?w=800&h=1000&fit=crop",
                "https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=800&h=1000&fit=crop"
            ]},
            { name: "Unimed VTRP", tag: "Campanha", images: [
                "https://images.unsplash.com/photo-1504439468489-c8920d796a29?w=800&h=1000&fit=crop",
                "https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=800&h=1000&fit=crop"
            ]},
            { name: "Kero Fazê", tag: "Social Media", images: [
                "https://images.unsplash.com/photo-1611162616475-46b635cb6868?w=800&h=1000&fit=crop",
                "https://images.unsplash.com/photo-1533750516457-a7f992034fec?w=800&h=1000&fit=crop"
            ]},
            { name: "Museu da PUC", tag: "Editorial", images: [
                "https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=800&h=1000&fit=crop",
                "https://images.unsplash.com/photo-1518998053901-5348d3961a04?w=800&h=1000&fit=crop"
            ]},
            { name: "Natura &Co", tag: "Packaging", images: [
                "https://images.unsplash.com/photo-1571781926291-c477ebfd024b?w=800&h=1000&fit=crop",
                "https://images.unsplash.com/photo-1587556930799-8dca6fad6d43?w=800&h=1000&fit=crop"
            ]}
        ];

        // Configurações
        let currentIndex = 0;
        let isScrolling = false;
        let scrollTimeout;
        let targetScroll = 0;
        let currentScroll = 0;
        let animationId = null;
        let lastDelta = 0;

        // Elementos DOM
        const track = document.getElementById('project-track');
        const leftCol = document.getElementById('left-col');
        const slotTop = document.getElementById('slot-top');
        const slotBot = document.getElementById('slot-bot');
        const counterSpan = document.getElementById('counter-num');
        
        const isMobile = window.innerWidth <= 768;
        const itemHeight = isMobile ? 70 : 88;
        const totalItems = projects.length;
        
        // Criar lista infinita (3 cópias para efeito infinito)
        const COPIES = 3;
        
        function buildList() {
            track.innerHTML = '';
            for (let c = 0; c < COPIES; c++) {
                projects.forEach((project, idx) => {
                    const div = document.createElement('div');
                    div.className = 'project-item';
                    div.setAttribute('data-index', idx);
                    div.innerHTML = `
                        <span class="label">${project.name}</span>
                        <span class="tag">${project.tag}</span>
                    `;
                    track.appendChild(div);
                });
            }
        }
        
        buildList();
        
        const allItems = document.querySelectorAll('.project-item');
        const centerOffset = leftCol.clientHeight / 2 - itemHeight / 2;
        const startOffset = (COPIES - 1) / 2 * totalItems * itemHeight;
        
        currentScroll = startOffset;
        targetScroll = startOffset;
        
        function updateScroll() {
            currentScroll += (targetScroll - currentScroll) * 0.1;
            
            // Wrap infinito
            const maxScroll = totalItems * itemHeight * COPIES;
            const minScroll = 0;
            
            if (currentScroll >= maxScroll - itemHeight) {
                currentScroll = startOffset;
                targetScroll = startOffset;
            }
            if (currentScroll <= minScroll + itemHeight) {
                currentScroll = startOffset;
                targetScroll = startOffset;
            }
            
            track.style.transform = `translateY(${-currentScroll + centerOffset}px)`;
            
            // Determinar índice ativo
            const rawIndex = Math.round(currentScroll / itemHeight) % totalItems;
            const activeIndex = (rawIndex + totalItems) % totalItems;
            
            // Atualizar classes active
            allItems.forEach((item, i) => {
                const itemProjectIndex = i % totalItems;
                if (itemProjectIndex === activeIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            // Atualizar contador
            counterSpan.textContent = String(activeIndex + 1).padStart(2, '0');
            
            // Mudar imagem se necessário
            if (currentIndex !== activeIndex && !isScrolling) {
                currentIndex = activeIndex;
                changeImage(activeIndex);
            } else if (currentIndex !== activeIndex && isScrolling) {
                // Durante scroll, esconde imagens
                if (slotTop.children.length > 0) {
                    animateOutImages(activeIndex);
                }
                currentIndex = activeIndex;
            }
            
            animationId = requestAnimationFrame(updateScroll);
        }
        
        function changeImage(index) {
            const project = projects[index];
            if (!project) return;
            
            const isMobileDevice = window.innerWidth <= 768;
            const xIn = lastDelta >= 0 ? 65 : -65;
            
            if (isMobileDevice) {
                // Mobile: apenas uma imagem
                const newSlide = document.createElement('div');
                newSlide.className = 'image-slide';
                newSlide.innerHTML = `<img src="${project.images[0]}" alt="${project.name}"><span class="img-label">${project.tag}</span>`;
                newSlide.style.transform = `translateX(${xIn}px)`;
                slotTop.innerHTML = '';
                slotTop.appendChild(newSlide);
                
                newSlide.animate(
                    [{ transform: `translateX(${xIn}px)` }, { transform: 'translateX(0px)' }],
                    { duration: 500, easing: 'cubic-bezier(0.2, 0.9, 0.4, 1.1)', fill: 'forwards' }
                );
            } else {
                // Desktop: duas imagens com stagger
                [slotTop, slotBot].forEach((slot, idx) => {
                    const newSlide = document.createElement('div');
                    newSlide.className = 'image-slide';
                    newSlide.innerHTML = `<img src="${project.images[idx]}" alt="${project.name}"><span class="img-label">${project.tag} — 0${idx + 1}</span>`;
                    newSlide.style.transform = `translateX(${xIn}px)`;
                    slot.innerHTML = '';
                    slot.appendChild(newSlide);
                    
                    const delay = idx === 1 ? 100 : 0;
                    newSlide.animate(
                        [{ transform: `translateX(${xIn}px)` }, { transform: 'translateX(0px)' }],
                        { duration: 500, delay, easing: 'cubic-bezier(0.2, 0.9, 0.4, 1.1)', fill: 'forwards' }
                    );
                });
            }
        }
        
        function animateOutImages(newIndex) {
            const slidesTop = slotTop.querySelectorAll('.image-slide');
            const slidesBot = slotBot.querySelectorAll('.image-slide');
            const isMobileDevice = window.innerWidth <= 768;
            
            const animateOut = (slide) => {
                slide.animate(
                    [{ transform: 'translateX(0px)' }, { transform: 'translateX(-65px)' }],
                    { duration: 300, easing: 'cubic-bezier(0.4, 0, 1, 1)', fill: 'forwards' }
                );
                setTimeout(() => {
                    if (slide.parentNode) slide.remove();
                }, 300);
            };
            
            slidesTop.forEach(animateOut);
            if (!isMobileDevice) slidesBot.forEach(animateOut);
            
            setTimeout(() => {
                const project = projects[newIndex];
                if (project) {
                    const xIn = lastDelta >= 0 ? 65 : -65;
                    
                    if (isMobileDevice) {
                        const newSlide = document.createElement('div');
                        newSlide.className = 'image-slide';
                        newSlide.innerHTML = `<img src="${project.images[0]}" alt="${project.name}"><span class="img-label">${project.tag}</span>`;
                        newSlide.style.transform = `translateX(${xIn}px)`;
                        slotTop.appendChild(newSlide);
                        
                        newSlide.animate(
                            [{ transform: `translateX(${xIn}px)` }, { transform: 'translateX(0px)' }],
                            { duration: 500, easing: 'cubic-bezier(0.2, 0.9, 0.4, 1.1)', fill: 'forwards' }
                        );
                    } else {
                        [slotTop, slotBot].forEach((slot, idx) => {
                            const newSlide = document.createElement('div');
                            newSlide.className = 'image-slide';
                            newSlide.innerHTML = `<img src="${project.images[idx]}" alt="${project.name}"><span class="img-label">${project.tag} — 0${idx + 1}</span>`;
                            newSlide.style.transform = `translateX(${xIn}px)`;
                            slot.appendChild(newSlide);
                            
                            const delay = idx === 1 ? 100 : 0;
                            newSlide.animate(
                                [{ transform: `translateX(${xIn}px)` }, { transform: 'translateX(0px)' }],
                                { duration: 500, delay, easing: 'cubic-bezier(0.2, 0.9, 0.4, 1.1)', fill: 'forwards' }
                            );
                        });
                    }
                }
            }, 300);
        }
        
        // Evento de scroll
        function handleWheel(e) {
            e.preventDefault();
            const delta = e.deltaY * 0.5;
            lastDelta = delta;
            
            targetScroll += delta;
            
            // Limites
            const maxScroll = totalItems * itemHeight * COPIES;
            const minScroll = 0;
            targetScroll = Math.min(Math.max(targetScroll, minScroll), maxScroll);
            
            isScrolling = true;
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                isScrolling = false;
                // Mostrar imagem final
                const rawIndex = Math.round(currentScroll / itemHeight) % totalItems;
                const activeIndex = (rawIndex + totalItems) % totalItems;
                changeImage(activeIndex);
            }, 200);
        }
        
        // Touch para mobile
        let touchStartY = 0;
        function handleTouchStart(e) {
            touchStartY = e.touches[0].clientY;
        }
        
        function handleTouchMove(e) {
            e.preventDefault();
            const deltaY = (touchStartY - e.touches[0].clientY) * 1.2;
            lastDelta = deltaY;
            targetScroll += deltaY;
            
            const maxScroll = totalItems * itemHeight * COPIES;
            const minScroll = 0;
            targetScroll = Math.min(Math.max(targetScroll, minScroll), maxScroll);
            
            isScrolling = true;
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                isScrolling = false;
                const rawIndex = Math.round(currentScroll / itemHeight) % totalItems;
                const activeIndex = (rawIndex + totalItems) % totalItems;
                changeImage(activeIndex);
            }, 200);
            
            touchStartY = e.touches[0].clientY;
        }
        
        // Inicializar imagens
        function initImages() {
            const isMobileDevice = window.innerWidth <= 768;
            const firstProject = projects[0];
            
            if (isMobileDevice) {
                const slide = document.createElement('div');
                slide.className = 'image-slide';
                slide.innerHTML = `<img src="${firstProject.images[0]}" alt="${firstProject.name}"><span class="img-label">${firstProject.tag}</span>`;
                slotTop.appendChild(slide);
            } else {
                [slotTop, slotBot].forEach((slot, idx) => {
                    const slide = document.createElement('div');
                    slide.className = 'image-slide';
                    slide.innerHTML = `<img src="${firstProject.images[idx]}" alt="${firstProject.name}"><span class="img-label">${firstProject.tag} — 0${idx + 1}</span>`;
                    slot.appendChild(slide);
                });
            }
        }
        
        initImages();
        updateScroll();
        
        // Event listeners
        const root = document.getElementById('portfolio-root');
        root.addEventListener('wheel', handleWheel, { passive: false });
        root.addEventListener('touchstart', handleTouchStart, { passive: true });
        root.addEventListener('touchmove', handleTouchMove, { passive: false });
        
        // Redimensionamento
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                location.reload();
            }, 300);
        });
    </script>
</body>
</html>
