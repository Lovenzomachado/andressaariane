<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;700&display=swap');

/* ── FONTE MANGO GROTESQUE do GitHub (Lovenzomachado/andressaariane) ── */
@font-face {
  font-family: 'Mango Grotesque';
  src: url('https://raw.githubusercontent.com/Lovenzomachado/andressaariane/main/Mango%20Grotesque.woff2') format('woff2');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

#portfolio-root {
  width: 100%;
  height: 100vh;
  min-height: 520px;
  overflow: hidden;
  position: relative;
  background: #fff;
  font-family: 'DM Sans', sans-serif;
}

/* ── DESKTOP: Grid principal 12 colunas ── */
.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  height: 100%;
}

/* ── Coluna esquerda: 8 de 12 colunas ── */
.col-left {
  grid-column: 1 / 9;
  position: relative;
  overflow: hidden;
}

/* ── Coluna direita: 4 de 12 colunas ── */
.col-right {
  grid-column: 9 / 13;
  position: relative;
  overflow: hidden;
  border-left: 0.5px solid #e8e8e8;
  background: #f8f8f8;
}

/* ── Track que se move verticalmente com o scroll ── */
.project-track {
  position: absolute;
  width: 100%;
  will-change: transform;
}

/* ── Item individual da lista - altura AUTO ── */
.project-item {
  padding: 8px 32px 8px 52px;
  user-select: none;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  opacity: 0.2;
  transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1);
  height: auto !important;
  margin-bottom: -12px;
}

.project-item.active { opacity: 1; }

/* ── Nome do projeto com MANGO GROTESQUE - Tamanho responsivo ── */
.project-item .label {
  display: block;
  font-family: 'Mango Grotesque', 'DM Sans', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  line-height: 1;
  letter-spacing: -0.01em;
  color: #000;
  white-space: nowrap;
  flex-shrink: 0;
  font-size: clamp(80px, 10vw, 200px);
}

/* Tela 1920px ou mais: 200px */
@media (min-width: 1920px) {
  .project-item .label {
    font-size: 200px;
  }
}

/* Tela 1280px: 126px */
@media (width: 1280px) {
  .project-item .label {
    font-size: 126px;
  }
}

/* ── Tag descritiva — centralizada verticalmente e à direita ── */
.project-item .tag {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #aaa;
  white-space: nowrap;
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.8s ease 0.15s;
  margin-left: auto;
  padding-left: 20px;
  display: flex;
  align-items: center;
  height: 100%;
}
.project-item.active .tag { opacity: 1; }

/* ── Stage das imagens (Desktop: 2 imagens) ── */
.image-stage {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 1; /* Sempre visível */
}

.image-slot {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.image-slide {
  position: absolute;
  inset: 0;
  opacity: 1; /* Sempre opaco, sem fade */
}
.image-slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.img-label {
  position: absolute;
  bottom: 14px;
  left: 16px;
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  font-family: Arial, Helvetica, sans-serif;
  font-weight: 300;
  pointer-events: none;
}

/* ── Navegação superior ── */
nav {
  position: absolute;
  top: 26px; left: 52px; right: 26px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
  pointer-events: none;
}
.nav-logo {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #000;
}
.nav-links { display: flex; gap: 28px; }
.nav-links a {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 8.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #aaa;
  text-decoration: none;
  pointer-events: all;
}

.scroll-hint {
  position: absolute;
  bottom: 26px; left: 52px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 8.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #ccc;
  display: flex;
  align-items: center;
  gap: 10px;
}
.scroll-hint::before {
  content: '';
  display: block;
  width: 20px;
  height: 0.5px;
  background: #ccc;
}

.counter {
  position: absolute;
  bottom: 26px; right: 26px;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.14em;
  color: #ccc;
}
.counter span { color: #000; font-size: 12px; font-weight: 700; }

/* ────────────────────────────────────────────────────────── */
/* MOBILE: até 768px */
/* ────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  #portfolio-root {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .grid {
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
  }

  .col-left {
    order: 2;
    grid-column: auto;
    width: 100%;
    height: 40%;
    overflow: hidden;
  }

  .col-right {
    order: 1;
    grid-column: auto;
    width: 100%;
    height: 60%;
    border-left: none;
    border-bottom: 0.5px solid #e8e8e8;
    position: relative;
    overflow: hidden;
  }

  .project-item {
    padding: 4px 20px 4px 20px;
    margin-bottom: 0 !important;
    height: auto !important;
  }

  .project-item .label {
    font-size: clamp(36px, 8vw, 80px);
    white-space: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }

  .project-item .tag {
    font-size: 7px;
    padding-left: 10px;
  }

  .image-stage {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }

  .image-slot {
    flex: 1;
    width: 100%;
  }

  #slot-bot {
    display: none;
  }

  .image-stage .image-slot:first-child {
    height: 100%;
    width: 100%;
  }

  .image-slide {
    width: 100%;
    height: 100%;
  }
  
  .image-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  nav {
    top: 16px;
    left: 20px;
    right: 16px;
  }

  .nav-logo {
    font-size: 9px;
  }

  .nav-links {
    gap: 16px;
  }

  .nav-links a {
    font-size: 7px;
  }

  .scroll-hint {
    bottom: 16px;
    left: 20px;
    font-size: 7px;
  }

  .counter {
    bottom: 16px;
    right: 16px;
    font-size: 7px;
  }
  
  .counter span {
    font-size: 10px;
  }
}

/* Ajuste para tablets (769px - 1024px) */
@media (min-width: 769px) and (max-width: 1024px) {
  .project-item .label {
    font-size: clamp(60px, 8vw, 120px);
  }
  
  .project-item {
    padding: 6px 28px 6px 40px;
    margin-bottom: -8px;
  }
}
</style>

<div id="portfolio-root">
  <nav>
    <div class="nav-logo">Andressa Ariane</div>
    <div class="nav-links">
      <a href="#">Sobre mim</a>
      <a href="#">Contato</a>
    </div>
  </nav>

  <div class="grid">
    <div class="col-left" id="left-col">
      <div class="project-track" id="project-track"></div>
    </div>
    <div class="col-right">
      <div class="image-stage" id="image-stage">
        <div class="image-slot" id="slot-top"></div>
        <div class="image-slot" id="slot-bot"></div>
      </div>
    </div>
  </div>

  <div class="scroll-hint">Scroll para navegar</div>
  <div class="counter"><span id="counter-num">01</span> / 07</div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// PROJETOS
// ─────────────────────────────────────────────────────────────────────────────
const projects = [
  { name: "Ipanema Pluma",   tag: "Identidade Visual", images: [
    "https://images.unsplash.com/photo-1523381294911-8d3cead13475?w=500&h=500&fit=crop",
    "https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=500&h=400&fit=crop"
  ]},
  { name: "Quinto Andar",    tag: "Branding Digital", images: [
    "https://images.unsplash.com/photo-1560185893-a55cbc8c57e8?w=500&h=500&fit=crop",
    "https://images.unsplash.com/photo-1486325212027-8081e485255e?w=500&h=400&fit=crop"
  ]},
  { name: "Élev Experience", tag: "Skincare Print", images: [
    "https://images.unsplash.com/photo-1556228578-8c89e6adf883?w=500&h=500&fit=crop",
    "https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=500&h=400&fit=crop"
  ]},
  { name: "Unimed VTRP",     tag: "Campanha", images: [
    "https://images.unsplash.com/photo-1504439468489-c8920d796a29?w=500&h=500&fit=crop",
    "https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=500&h=400&fit=crop"
  ]},
  { name: "Kero Fazê",       tag: "Social Media", images: [
    "https://images.unsplash.com/photo-1611162616475-46b635cb6868?w=500&h=500&fit=crop",
    "https://images.unsplash.com/photo-1533750516457-a7f992034fec?w=500&h=400&fit=crop"
  ]},
  { name: "Museu da PUC",    tag: "Editorial", images: [
    "https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=500&h=500&fit=crop",
    "https://images.unsplash.com/photo-1518998053901-5348d3961a04?w=500&h=400&fit=crop"
  ]},
  { name: "Natura &Co",      tag: "Packaging", images: [
    "https://images.unsplash.com/photo-1571781926291-c477ebfd024b?w=500&h=500&fit=crop",
    "https://images.unsplash.com/photo-1587556930799-8dca6fad6d43?w=500&h=400&fit=crop"
  ]}
];

// ─────────────────────────────────────────────────────────────────────────────
// FUNÇÃO PARA VERIFICAR SE É MOBILE
// ─────────────────────────────────────────────────────────────────────────────
function isMobileDevice() {
  return window.innerWidth <= 768;
}

// ─────────────────────────────────────────────────────────────────────────────
// CÁLCULO DA ALTURA DOS ITENS (baseado no conteúdo real)
// ─────────────────────────────────────────────────────────────────────────────
function getItemHeightFromDOM() {
  if (isMobileDevice()) return 70;
  
  const firstItem = document.querySelector('.project-item');
  if (firstItem) {
    const height = firstItem.offsetHeight;
    return height + 12;
  }
  return 220;
}

// ─────────────────────────────────────────────────────────────────────────────
// VARIÁVEIS GLOBAIS
// ─────────────────────────────────────────────────────────────────────────────
let total = projects.length;
let track = document.getElementById('project-track');
let stage = document.getElementById('image-stage');
let slotTop = document.getElementById('slot-top');
let slotBot = document.getElementById('slot-bot');
let counterNum = document.getElementById('counter-num');
let leftCol = document.getElementById('left-col');

let allItems = [];
let CONFIG = {};
let scrollY, targetY, prevScrollY, lastDir, isScrolling, idleTimer, enterTimer;
let state = { visible: false, activeIdx: -1 };
let animationId = null;

// ─────────────────────────────────────────────────────────────────────────────
// FUNÇÃO PARA RECONSTRUIR A LISTA
// ─────────────────────────────────────────────────────────────────────────────
function rebuildList() {
  if (!track) return;
  
  track.innerHTML = '';
  
  const COPIES = 7;
  for (let c = 0; c < COPIES; c++) {
    projects.forEach(p => {
      const el = document.createElement('div');
      el.className = 'project-item';
      el.innerHTML = `<span class="label">${p.name}</span><span class="tag">${p.tag}</span>`;
      track.appendChild(el);
    });
  }
  
  allItems = Array.from(track.querySelectorAll('.project-item'));
  
  requestAnimationFrame(() => {
    const itemHeight = getItemHeightFromDOM();
    
    const COPIES_ABOVE = Math.floor(COPIES / 2);
    const INITIAL_SCROLL = COPIES_ABOVE * projects.length * itemHeight;
    
    scrollY = INITIAL_SCROLL;
    targetY = INITIAL_SCROLL;
    prevScrollY = INITIAL_SCROLL;
    lastDir = 1;
    isScrolling = false;
    
    if (idleTimer) clearTimeout(idleTimer);
    if (enterTimer) clearTimeout(enterTimer);
    
    CONFIG = {
      ITEM_H: itemHeight,
      COPIES: COPIES,
      LERP: 0.038,
      WHEEL_SPEED: 0.42,
      TOUCH_SPEED: 1.1,
      IDLE_MS: 220,
      ENTER_DELAY_MS: 380,
      EXIT: {
        duration: 300,
        easing: 'cubic-bezier(0.4, 0, 1, 1)',
        translateX: -24,
      },
      ENTER: {
        duration: 400,
        easing: 'cubic-bezier(0.2, 0.9, 0.4, 1.1)',
        translateX: 65,
        stagger: 80,
      },
    };
    
    if (animationId) cancelAnimationFrame(animationId);
    loop();
    setTimeout(() => showProject(0, 1), 100);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// FUNÇÕES DO CARROSSEL - SEM OPACIDADE, APENAS SLIDE DA ESQUERDA
// ─────────────────────────────────────────────────────────────────────────────
function clearSlots() {
  if (slotTop) slotTop.innerHTML = '';
  if (slotBot) slotBot.innerHTML = '';
}

function showProject(idx, dir) {
  if (state.activeIdx === idx || !stage || !slotTop) return;
  
  const previousIdx = state.activeIdx;
  state.activeIdx = idx;
  state.visible = true;

  const p = projects[idx];
  const xIn = dir >= 0 ? CONFIG.ENTER.translateX : -CONFIG.ENTER.translateX;
  const isMobile = isMobileDevice();

  // Animação de saída para as imagens anteriores (desliza para esquerda)
  if (previousIdx !== -1 && !isMobile) {
    const previousSlidesTop = slotTop.querySelectorAll('.image-slide');
    const previousSlidesBot = slotBot.querySelectorAll('.image-slide');
    
    previousSlidesTop.forEach(slide => {
      slide.animate(
        [
          { transform: 'translateX(0px)' },
          { transform: `translateX(-${CONFIG.EXIT.translateX}px)` }
        ],
        { duration: CONFIG.EXIT.duration, easing: CONFIG.EXIT.easing, fill: 'forwards' }
      );
      setTimeout(() => slide.remove(), CONFIG.EXIT.duration);
    });
    
    previousSlidesBot.forEach(slide => {
      slide.animate(
        [
          { transform: 'translateX(0px)' },
          { transform: `translateX(-${CONFIG.EXIT.translateX}px)` }
        ],
        { duration: CONFIG.EXIT.duration, easing: CONFIG.EXIT.easing, fill: 'forwards' }
      );
      setTimeout(() => slide.remove(), CONFIG.EXIT.duration);
    });
  } else {
    clearSlots();
  }

  // Animação de entrada para as novas imagens (vem da direita)
  setTimeout(() => {
    if (isMobile) {
      const slide = document.createElement('div');
      slide.className = 'image-slide';
      slide.innerHTML = `<img src="${p.images[0]}" /><span class="img-label">${p.tag}</span>`;
      slide.style.transform = `translateX(${xIn}px)`;
      slotTop.appendChild(slide);

      slide.animate(
        [
          { transform: `translateX(${xIn}px)` },
          { transform: 'translateX(0px)' }
        ],
        { duration: CONFIG.ENTER.duration, easing: CONFIG.ENTER.easing, fill: 'forwards' }
      );
    } else {
      [slotTop, slotBot].forEach((slot, si) => {
        if (!slot) return;
        const slide = document.createElement('div');
        slide.className = 'image-slide';
        slide.innerHTML = `<img src="${p.images[si]}" /><span class="img-label">${p.tag} — 0${si + 1}</span>`;
        slide.style.transform = `translateX(${xIn}px)`;
        slot.appendChild(slide);

        const delay = si === 1 ? CONFIG.ENTER.stagger : 0;
        slide.animate(
          [
            { transform: `translateX(${xIn}px)` },
            { transform: 'translateX(0px)' }
          ],
          { duration: CONFIG.ENTER.duration, delay, easing: CONFIG.ENTER.easing, fill: 'forwards' }
        );
      });
    }
  }, previousIdx !== -1 && !isMobile ? CONFIG.EXIT.duration : 0);
}

// ─────────────────────────────────────────────────────────────────────────────
function hideStage() {
  // Não faz nada - mantém as imagens visíveis
}

function getActiveIndex(y) {
  if (!CONFIG.ITEM_H) return 0;
  const wrap = projects.length * CONFIG.ITEM_H;
  return Math.round(((y % wrap) + wrap) % wrap / CONFIG.ITEM_H) % projects.length;
}

function onIdle() {
  isScrolling = false;
  const idx = getActiveIndex(scrollY);
  clearTimeout(enterTimer);
  enterTimer = setTimeout(() => showProject(idx, lastDir), CONFIG.ENTER_DELAY_MS);
}

function handleInput(delta) {
  targetY += delta;
  clearTimeout(enterTimer);

  if (!isScrolling) {
    isScrolling = true;
  }

  clearTimeout(idleTimer);
  idleTimer = setTimeout(onIdle, CONFIG.IDLE_MS);
}

function loop() {
  if (!CONFIG.ITEM_H || !leftCol) {
    requestAnimationFrame(loop);
    return;
  }
  
  scrollY += (targetY - scrollY) * CONFIG.LERP;

  const wrap = projects.length * CONFIG.ITEM_H;
  const COPIES_ABOVE = Math.floor(CONFIG.COPIES / 2);
  const INITIAL_SCROLL = COPIES_ABOVE * projects.length * CONFIG.ITEM_H;
  const wrapLow = INITIAL_SCROLL - wrap;
  const wrapHigh = INITIAL_SCROLL + wrap * (CONFIG.COPIES - COPIES_ABOVE - 1);

  if (scrollY > wrapHigh) { scrollY -= wrap; targetY -= wrap; }
  if (scrollY < wrapLow) { scrollY += wrap; targetY += wrap; }

  const colH = leftCol.clientHeight;
  const center = colH / 2 - CONFIG.ITEM_H / 2;
  if (track) {
    track.style.transform = `translateY(${Math.round(-scrollY + center)}px)`;
  }

  const vel = scrollY - prevScrollY;
  if (Math.abs(vel) > 0.01) lastDir = vel > 0 ? 1 : -1;
  prevScrollY = scrollY;

  const ai = getActiveIndex(scrollY);
  if (counterNum) {
    counterNum.textContent = String(ai + 1).padStart(2, '0');
  }
  if (allItems) {
    allItems.forEach((el, gi) => el.classList.toggle('active', (gi % projects.length) === ai));
  }

  animationId = requestAnimationFrame(loop);
}

// ─────────────────────────────────────────────────────────────────────────────
// FUNÇÃO PARA REINICIAR TUDO NO REDIMENSIONAMENTO
// ─────────────────────────────────────────────────────────────────────────────
function resetAndRebuild() {
  if (animationId) {
    cancelAnimationFrame(animationId);
  }
  
  const root = document.getElementById('portfolio-root');
  if (root) {
    const newRoot = root.cloneNode(true);
    root.parentNode.replaceChild(newRoot, root);
    
    track = document.getElementById('project-track');
    stage = document.getElementById('image-stage');
    slotTop = document.getElementById('slot-top');
    slotBot = document.getElementById('slot-bot');
    counterNum = document.getElementById('counter-num');
    leftCol = document.getElementById('left-col');
    
    if (track) {
      rebuildList();
      
      const newRootElement = document.getElementById('portfolio-root');
      if (newRootElement) {
        newRootElement.addEventListener('wheel', e => {
          e.preventDefault();
          handleInput(e.deltaY * CONFIG.WHEEL_SPEED);
        }, { passive: false });
        
        let touchY = null;
        newRootElement.addEventListener('touchstart', e => { touchY = e.touches[0].clientY; }, { passive: true });
        newRootElement.addEventListener('touchmove', e => {
          e.preventDefault();
          handleInput((touchY - e.touches[0].clientY) * CONFIG.TOUCH_SPEED);
          touchY = e.touches[0].clientY;
        }, { passive: false });
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// INICIALIZAÇÃO
// ─────────────────────────────────────────────────────────────────────────────
rebuildList();

let resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() {
    resetAndRebuild();
  }, 250);
});
</script>
